<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e2530" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080a0d"/>
  <rect width="1200" height="630" fill="url(#g)" opacity="0.35"/>

  <!-- Subtle blue glow -->
  <ellipse cx="100" cy="315" rx="500" ry="400" fill="#3b82f6" opacity="0.04"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#3b82f6" opacity="0.7"/>

  <!-- Badge -->
  <rect x="60" y="130" width="258" height="30" rx="4" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.28)" stroke-width="1"/>
  <circle cx="80" cy="145" r="5" fill="#22d3ee"/>
  <text x="96" y="150" font-family="'Courier New', Courier, monospace" font-size="13" fill="#22d3ee" letter-spacing="1.4">PYTHON · MACOS · OPENCV</text>

  <!-- Main title -->
  <text font-family="'Courier New', Courier, monospace" font-size="76" font-weight="600" letter-spacing="-2">
    <tspan x="60" y="265" fill="#ffffff">remove_</tspan><tspan fill="#3b82f6">watermark</tspan><tspan fill="#ffffff">.py</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="322" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#64748b" font-weight="300">Удаляет белый текст и водяные знаки с любых фото.</text>
  <text x="60" y="354" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#64748b" font-weight="300">Интерактивный редактор зоны. Работает локально.</text>

  <!-- Divider -->
  <line x1="60" y1="408" x2="680" y2="408" stroke="#1e2530" stroke-width="1"/>

  <!-- Footer -->
  <text x="60" y="442" font-family="'Courier New', Courier, monospace" font-size="15" fill="#3b82f6">@mansurov_rafael</text>
  <text x="230" y="442" font-family="'Courier New', Courier, monospace" font-size="15" fill="#252d3a">  ·  </text>
  <text x="270" y="442" font-family="'Courier New', Courier, monospace" font-size="15" fill="#334155">github.com/rafael-mansurov/remove-watermark</text>

  <!-- Right panel: terminal mockup -->
  <rect x="790" y="90" width="350" height="450" rx="10" fill="#0f1318" stroke="#1e2530" stroke-width="1"/>
  <!-- Toolbar -->
  <rect x="790" y="90" width="350" height="38" rx="10" fill="#161b22"/>
  <rect x="790" y="110" width="350" height="18" fill="#161b22"/>
  <circle cx="816" cy="109" r="6" fill="#ff5f57"/>
  <circle cx="836" cy="109" r="6" fill="#febc2e"/>
  <circle cx="856" cy="109" r="6" fill="#28c840"/>
  <text x="880" y="115" font-family="'Courier New', Courier, monospace" font-size="12" fill="#334155">remove_watermark.py</text>

  <!-- Terminal output lines -->
  <text x="812" y="162" font-family="'Courier New', Courier, monospace" font-size="13" fill="#6272a4">$ python3 remove_watermark.py</text>
  <text x="812" y="192" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">Folder : ~/Desktop/Photos</text>
  <text x="812" y="212" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">Output : ~/Desktop/Photos/cleaned</text>
  <text x="812" y="232" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">Found  : 24 images</text>
  <text x="812" y="264" font-family="'Courier New', Courier, monospace" font-size="13" fill="#22d3ee">  [1/24] IMG_001.jpg</text>
  <text x="812" y="284" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">    ENTER = process</text>
  <text x="812" y="304" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">    S/N   = skip</text>
  <text x="812" y="324" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">    ESC   = quit all</text>
  <line x1="812" y1="340" x2="1124" y2="340" stroke="#1e2530" stroke-width="1"/>
  <text x="812" y="366" font-family="'Courier New', Courier, monospace" font-size="13" fill="#10b981">  [1/24] Done: IMG_001.jpg</text>
  <text x="812" y="386" font-family="'Courier New', Courier, monospace" font-size="13" fill="#10b981">  [2/24] Done: IMG_002.jpg</text>
  <text x="812" y="406" font-family="'Courier New', Courier, monospace" font-size="13" fill="#10b981">  [3/24] Done: IMG_003.jpg</text>
  <text x="812" y="426" font-family="'Courier New', Courier, monospace" font-size="13" fill="#334155">  ...</text>
  <text x="812" y="460" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">Done: 24 processed, 0 errors</text>
  <text x="812" y="480" font-family="'Courier New', Courier, monospace" font-size="13" fill="#475569">Output: ~/Desktop/Photos/cleaned</text>
  <!-- Blinking cursor -->
  <rect x="812" y="500" width="8" height="16" fill="#3b82f6" opacity="0.85"/>
</svg>
